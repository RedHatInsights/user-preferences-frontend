extends:
  - '@redhat-cloud-services/eslint-config-redhat-cloud-services'
globals:
  insights: writable
rules:
  no-unused-vars:
    - warn
    - ignoreRestSiblings: true
      argsIgnorePattern: '^_'
  prettier/prettier:
    - error
    - singleQuote: true
  sort-imports:
    - error
    - ignoreDeclarationSort: true
overrides:
  - files:
      - 'src/SmartComponents/FormComponents/severityOrder.ts'
      - 'src/SmartComponents/FormComponents/severityUtils.ts'
      - 'src/SmartComponents/FormComponents/severityUtils.test.ts'
      - 'src/SmartComponents/FormComponents/eventCardUtils.ts'
      - 'src/SmartComponents/FormComponents/eventCardUtils.test.ts'
      - 'src/SmartComponents/FormComponents/NotificationEventCard.tsx'
      - 'src/SmartComponents/FormComponents/NotificationEventCard.test.tsx'
      - 'src/SmartComponents/FormComponents/NotificationEventCard.stories.tsx'
    parser: '@typescript-eslint/parser'
    plugins:
      - '@typescript-eslint'
    parserOptions:
      ecmaVersion: 2022
      sourceType: module
      ecmaFeatures:
        jsx: true
    rules:
      no-undef: 'off'
